        body {

          color: #fff; /* Set the default text color to white */

        body[data-theme='light'] {

        }

        header {

        .TitleHeader {

            margin-top: 20px;
            color: #fff;
            margin-left: auto;
            margin-right: auto;

        table[data-theme='light'] {

          color: #333; /* Set the text color to dark in light mode */
        }
        
        th, td {
            border: 1px solid; /* Remove the border color */
            border-color: rgba(255, 255, 255, 0.5); /* Set the border color with alpha value for transparency */
            padding: 8px;
            text-align: left;
        }


        body[data-theme='light'] table {
            color: #000; /* Set text color to black only in light mode */
        }



        a {
            color: #00f; 
            text-decoration: underline;
            cursor: pointer;
        }

        .mirror-image {
            width: 20px; /* Adjust the width of the image */
            height: auto;

        }

        
        .mirror-button {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background-color: purple;
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, outline 0.3s;
            outline: none;
        }

        .mirror-button:hover {
            background-color: #333;
            outline: 2px solid purple;
        }
        
        .mirror-button-onedrive {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background-color: var(--onedrive-color);
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, outline 0.3s;
            outline: none;
        }

        .mirror-button-onedrive:hover {
            background-color: #333;
            outline: 2px solid var(--onedrive-color);
        }

        .mirror-button-gdrive {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background: var(--google-drive-color);
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, outline 0.3s;
            outline: none;
        }

        .mirror-button-gdrive:hover {
            background-color: #333;
            outline: 2px solid var(--google-drive-color);
        }

        .mirror-button-linksdown {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background: var(--links-down-color);
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, outline 0.3s;
            outline: none;
        }

        .mirror-button-linksdown:hover {
            background-color: #333;
            outline: 2px solid var(--links-down-color);
        }
        .mirror-button,
        .mirror-button-onedrive,
        .mirror-button-linksdown,
        .mirror-button-gdrive {
            margin-bottom: 10px; /* Adjust the margin as needed */
        }

        /* Add this inside your <style> */
        .theme-switch {
          position: absolute;
          top: 15px;
          right: 15px;
          display: flex;
          align-items: center;
        }

        .switch {
          position: relative;
          display: inline-block;
          width: 60px;
          height: 34px;
        }

        .switch input {
          opacity: 0;
          width: 0;
          height: 0;
        }

        .slider {
          position: absolute;
          cursor: pointer;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          background-color: #ccc;
          -webkit-transition: 0.4s;
          transition: 0.4s;
          border-radius: 34px;
        }

        .slider:before {
          position: absolute;
          content: "";
          height: 26px;
          width: 26px;
          left: 4px;
          bottom: 4px;
          background-color: white;
          -webkit-transition: 0.4s;
          transition: 0.4s;
          border-radius: 50%;
        }

        input:checked + .slider {
          background-color: #2196F3;
        }

        input:checked + .slider:before {
          -webkit-transform: translateX(26px);
          -ms-transform: translateX(26px);
          transform: translateX(26px);
        }

        #themeText {
          margin-left: 10px;
          color: #fff;
        }

        <!-- Inside your <head> -->
        <script>
          document.addEventListener('DOMContentLoaded', function () {
            const themeToggle = document.getElementById('themeToggle');
            const themeText = document.getElementById('themeText');
            const body = document.body;

            // Check the user's preference from localStorage
            const currentTheme = localStorage.getItem('theme');
            if (currentTheme) {
              body.setAttribute('data-theme', currentTheme);
              themeToggle.checked = currentTheme === 'light';
              themeText.textContent = currentTheme === 'light' ? 'Light Mode' : 'Dark Mode';
            }

            // Toggle theme on checkbox change
            themeToggle.addEventListener('change', function () {
              const newTheme = themeToggle.checked ? 'light' : 'dark';
              body.setAttribute('data-theme', newTheme);
              themeText.textContent = themeToggle.checked ? 'Light Mode' : 'Dark Mode';

              // Save the user's preference to localStorage
              localStorage.setItem('theme', newTheme);
            });
          });
        </script>
