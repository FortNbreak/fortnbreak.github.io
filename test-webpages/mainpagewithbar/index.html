<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPRRPKS</title>
    <style>
        :root {
            --onedrive-color: rgb(20, 144, 223);
            --google-color: linear-gradient(to right, #00ff00, #0000ff, #ffff00); /* Used a gradient to match with the three main colors of the google drive logo */
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #333; /* Set the background color to black */
            color: #fff; /* Set text color to white */
        }

        header {
            background-color: #000;
            color: #fff;
            padding: 15px;
            text-align: center;
        }

        header img {
            width: 50px; 
            height: auto;
            margin-right: 10px;
            vertical-align: middle;
        }

        header a {
            color: #fff;
            text-decoration: none;
            margin: 0 15px;
        }

        main {
            padding: 20px;
        }

        .TitleHeader {
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            color: #fff;
        }

        th, td {
            border: 1px solid #fff;
            padding: 8px;
            text-align: left;
        }

        a {
            color: #00f; 
            text-decoration: underline;
            cursor: pointer;
        }

        .mirror-image {
            width: 20px; /* Adjust the width of the image */
            height: auto;
            margin-right: 5px; /* Adjust the margin as needed */
        }

        
        .mirror-button {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background-color: purple;
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, outline 0.3s;
            outline: none;
        }

        .mirror-button:hover {
            background-color: #333;
            outline: 2px solid purple;
        }
        
        .mirror-button-onedrive {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background-color: var(--onedrive-color);
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, outline 0.3s;
            outline: none;
        }

        .mirror-button-onedrive:hover {
            background-color: #333;
            outline: 2px solid var(--onedrive-color);
        }

        .mirror-button-gdrive {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 12px;
            background: linear-gradient(to right, #4285F4, #0F9D58, #F4B400);
            color: #fff;
            text-decoration: none;
            text-align: center;
            transition: background-color 0.3s, outline 0.3s;
            outline: none;
        }

        .mirror-button-gdrive:hover {
            background-color: #333;
            box-shadow: 0 0 0 2px purple;
        }


    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="Reapr RPKS Logo">
        <nav>
            <a href="https://fortnbreak.github.io/test-webpages/mainpagewithbar/">Home</a>
            <a href="https://fortnbreak.github.io/test-webpages/mainpagewithbar/about">About</a>
            <a href="https://fortnbreak.github.io/test-webpages/mainpagewithbar/contact">Contact</a>
            <!-- Add more links as needed -->
        </nav>
    </header>

    <main>
        <!-- Your page content goes here -->
        <h1>Reapr Downloads</h1>
        <p>Contains All Of Reapr's RPKS</p>
    </main>

    <table>
        <thead>
            <tr>
                <th>Game Name</th>
                <th>Size</th>
                <th>Mirrors</th>
            </tr>
        </thead>
        <!-- Previous code... -->

        <tbody>
            <tr>
                <td>Game 1</td>
                <td>2 GB</td>
                <td>
                    <div>
                        <img class="mirror-image" src="googledrive.jpg" alt="Google Drive Logo">
                        <a class="mirror-button-gdrive" href="#">Google Drive</a>
                    </div>
                    <div>
                        <img class="mirror-image" src="onedrive.png" alt="Onedrive Logo">
                        <a class="mirror-button-onedrive" href="#">Onedrive</a>
                    </div>
                </td>
            </tr>
            <tr>
                <td>Game 2</td>
                <td>1.5 GB</td>
                <td>Mirror 1</td>
            </tr>
            <!-- Add more rows as needed -->
        </tbody>

        <!-- Next part of the code... -->

    </table>

</body>
</html>
